<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste de Upload - Mochila do Aventureiro</title>
    <style>
        body { font-family: sans-serif; background: #121214; color: #fff; padding: 20px; }
        .box { background: #202024; padding: 20px; border-radius: 8px; max-width: 400px; }
        input, button { margin-top: 10px; width: 100%; padding: 10px; box-sizing: border-box; }
        button { background: #9871f5; color: white; border: none; cursor: pointer; font-weight: bold;}
        #resultado { margin-top: 20px; color: #50fa7b; word-break: break-all; }
        img { max-width: 100%; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Enviar Avatar</h2>
        <input type="file" id="arquivo-imagem" accept=".jpg, .jpeg, .png, .webp, .gif">
        <button onclick="fazerUpload()">Fazer Upload no Debian</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        async function fazerUpload() {
            const inputArquivo = document.getElementById('arquivo-imagem');
            if (inputArquivo.files.length === 0) return alert("Selecione uma imagem!");

            // 1. Pega o Token do localStorage (Você precisa estar logado para testar!)
            const token = localStorage.getItem('token_m20');
            if (!token) return alert("Você precisa fazer login primeiro!");

            // 2. Monta o formulário de envio de arquivos (FormData)
            const formData = new FormData();
            formData.append('imagem', inputArquivo.files[0]); 

            try {
                // 3. Dispara para a rota passando "avatares" na URL
                const resposta = await fetch('/midia/upload/avatares', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}` // Sem Content-Type, o navegador ajusta automático pro FormData
                    },
                    body: formData
                });

                const data = await resposta.json();

                if (resposta.ok) {
                    const divResultado = document.getElementById('resultado');
                    divResultado.innerHTML = `
                        Upload Sucesso!<br>
                        URL: ${data.url}<br>
                        <img src="${data.url}" alt="Preview do Upload">
                    `;
                } else {
                    alert("Erro: " + data.erro);
                }
            } catch (err) {
                console.error(err);
                alert("Erro ao conectar com o servidor.");
            }
        }
    </script>
</body>
</html>
