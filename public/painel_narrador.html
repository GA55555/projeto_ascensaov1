<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade da Crônica</title>
    <style>
        :root { --bg-principal: #121214; --bg-card: #202024; --roxo-mago: #9871f5; --roxo-hover: #7f57df; --texto-claro: #e1e1e6; --texto-mutado: #8d8d99; --borda: #29292e; --destaque: #50fa7b; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-principal); color: var(--texto-claro); margin: 0; padding: 0; }
        
        /* BANNER */
        .banner-comunidade { width: 100%; height: 300px; background-color: var(--borda); background-size: cover; background-position: center; position: relative; border-bottom: 2px solid var(--roxo-mago); }
        .banner-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 40px 20px 20px 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .banner-titulo { margin: 0; font-size: 32px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .btn-voltar { color: #fff; text-decoration: none; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 4px; border: 1px solid var(--texto-mutado); }
        .btn-voltar:hover { background: var(--roxo-mago); border-color: var(--roxo-mago); }

        /* GRID PRINCIPAL */
        .container-social { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
        
        /* MENU LATERAL */
        .menu-abas { background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--borda); align-self: start; }
        .titulo-menu { color: var(--texto-mutado); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .lista-abas { list-style: none; padding: 0; margin: 0; }
        .aba-item { padding: 10px 15px; margin-bottom: 5px; background: var(--bg-principal); border-radius: 4px; cursor: pointer; border-left: 3px solid transparent; transition: 0.2s; }
        .aba-item:hover { background: #29292e; }
        .aba-item.ativa { border-left-color: var(--roxo-mago); font-weight: bold; color: var(--roxo-mago); }
        .btn-nova-aba { margin-top: 15px; width: 100%; padding: 10px; background: transparent; color: var(--destaque); border: 1px dashed var(--destaque); border-radius: 4px; cursor: pointer; }
        .btn-nova-aba:hover { background: rgba(80, 250, 123, 0.1); }

        /* FEED CENTRAL */
        .feed-container { display: flex; flex-direction: column; gap: 20px; }
        .caixa-postar { background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--borda); }
        .caixa-postar textarea { width: 100%; background: var(--bg-principal); border: 1px solid var(--borda); color: #fff; padding: 15px; border-radius: 4px; resize: vertical; min-height: 80px; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        .caixa-postar textarea:focus { border-color: var(--roxo-mago); }
        .acoes-post { display: flex; justify-content: space-between; align-items: center; }
        .btn-postar { background: var(--roxo-mago); color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-postar:hover { background: var(--roxo-hover); }

        /* POSTAGEM */
        .post { background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--borda); }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .avatar-post { width: 40px; height: 40px; border-radius: 50%; background: var(--roxo-mago); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; color: #fff;}
        .nome-autor { font-weight: bold; color: var(--destaque); }
        .data-post { font-size: 12px; color: var(--texto-mutado); }
        .post-conteudo { line-height: 1.6; white-space: pre-wrap; }

        /* RESPONSIVIDADE PARA CELULARES */
        @media (max-width: 768px) {
            .container-social { grid-template-columns: 1fr; }
            .banner-titulo { font-size: 24px; }
        }

        .btn-delete { display: none; background: none; border: none; color: #ff5555; cursor: pointer; font-weight: bold; font-size: 16px; }
        .aba-item:hover .btn-delete { display: block; }
        .aba-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    </style>
</head>
<body>

    <div class="banner-comunidade" id="banner-cronica">
        <div class="banner-overlay">
            <h1 class="banner-titulo" id="titulo-cronica">Carregando...</h1>
            <a href="/profile.html" class="btn-voltar">← Sair da Mesa</a>
        </div>
    </div>

    <div class="container-social">
        
        <div class="menu-abas">
        <div class="titulo-menu">Salas da Comunidade</div>
        <ul class="lista-abas" id="lista-abas"></ul>
        </div>
    
        <div class="feed-container">
            <div class="caixa-postar">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button onclick="selecionarTipoPost('normal')" id="btn-tipo-normal" style="background: var(--roxo-mago); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">📝 Normal</button>
                <button onclick="selecionarTipoPost('album')" id="btn-tipo-album" style="background: transparent; border: 1px solid var(--borda); color: var(--texto-claro); padding: 8px 16px; border-radius: 4px; cursor: pointer;">🖼️ Álbum</button>
                <button onclick="selecionarTipoPost('votacao')" id="btn-tipo-votacao" style="background: transparent; border: 1px solid var(--borda); color: var(--texto-claro); padding: 8px 16px; border-radius: 4px; cursor: pointer;">🗳️ Votação</button>
            </div>
        
            <div id="form-post-normal">
                <textarea id="texto-post" placeholder="Escreva algo..."></textarea>
                <input type="file" id="input-imagem" accept="image/*">
            </div>
        
            <div id="form-post-album" style="display: none;">
                <div id="album-itens"></div>
                <button onclick="adicionarItemAlbum()" style="background: transparent; border: 1px dashed var(--destaque); color: var(--destaque); padding: 10px; border-radius: 4px; cursor: pointer; width: 100%;">+ Adicionar Imagem ao Álbum</button>
            </div>
        
            <div id="form-post-votacao" style="display: none;">
                <input type="text" id="votacao-pergunta" placeholder="Pergunta da votação..." style="width: 100%; padding: 10px; background: var(--bg-principal); border: 1px solid var(--borda); color: #fff; border-radius: 4px; margin-bottom: 10px;">
                <div id="votacao-opcoes">
                    <input type="text" class="opcao-votacao" placeholder="Opção 1" style="width: 100%; padding: 8px; margin-bottom: 5px; background: var(--bg-principal); border: 1px solid var(--borda); color: #fff; border-radius: 4px;">
                    <input type="text" class="opcao-votacao" placeholder="Opção 2" style="width: 100%; padding: 8px; margin-bottom: 5px; background: var(--bg-principal); border: 1px solid var(--borda); color: #fff; border-radius: 4px;">
                </div>
                <button onclick="adicionarOpcaoVotacao()" style="background: transparent; border: 1px dashed var(--destaque); color: var(--destaque); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">+ Opção</button>
            </div>
        
            <button class="btn-postar" onclick="publicarPost()" style="margin-top: 10px;">Publicar</button>
        </div>

            <div id="lista-posts">
                <p style="color: var(--texto-mutado); text-align: center;">Carregando mensagens do éter...</p>
            </div>
        </div>
    </div>
    
   

    <div id="modal-vinculo" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
        <div style="background: var(--bg-card); padding: 30px; border-radius: 8px; border: 1px solid var(--roxo-mago); width: 400px; max-width: 90%;">
            <h3 style="margin-top: 0; color: var(--destaque);">🔗 Vincular Causa ao Evento</h3>
            <input type="hidden" id="vinculo-event-id">
            <label style="display: block; margin-bottom: 5px; color: var(--texto-mutado);">Escolha o Núcleo (Entidade)</label>
            <select id="vinculo-node-id" onchange="atualizarListaDeFlagsVinculo()" style="width: 100%; padding: 10px; margin-bottom: 15px; background: var(--bg-principal); border: 1px solid var(--borda); color: white; border-radius: 4px;"></select>
            <label style="display: block; margin-bottom: 5px; color: var(--texto-mutado);">Selecione a Flag</label>
            <select id="vinculo-flag-key" style="width: 100%; padding: 10px; margin-bottom: 15px; background: var(--bg-principal); border: 1px solid var(--borda); color: white; border-radius: 4px; box-sizing: border-box;">
                <option value="">Selecione um núcleo primeiro...</option>
            </select>
            <label style="display: block; margin-bottom: 5px; color: var(--texto-mutado);">Peso de Tensão (Quantos pontos soma se for TRUE?)</label>
            <input type="number" id="vinculo-peso" value="1" min="1" style="width: 100%; padding: 10px; margin-bottom: 25px; background: var(--bg-principal); border: 1px solid var(--borda); color: white; border-radius: 4px; box-sizing: border-box;">
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button onclick="fecharModalVinculo()" style="padding: 10px 15px; background: transparent; border: 1px solid var(--texto-mutado); color: var(--texto-claro); border-radius: 4px; cursor: pointer;">Cancelar</button>
                <button onclick="salvarVinculo()" style="padding: 10px 15px; background: var(--roxo-mago); border: none; color: white; border-radius: 4px; font-weight: bold; cursor: pointer;">Vincular</button>
            </div>
        </div>
    </div>

    <div id="modal-permissoes" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
        <div style="background: var(--bg-card); padding: 30px; border-radius: 8px; border: 1px solid var(--roxo-mago); width: 500px; max-width: 90%;">
            <h3 style="margin-top: 0; color: var(--destaque);">🔐 Controle de Acesso da Aba</h3>
            <input type="hidden" id="perm-aba-id">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <select id="perm-jogador-id" style="flex: 1; padding: 10px; background: var(--bg-principal); border: 1px solid var(--borda); color: white; border-radius: 4px;">
                    <option value="">Selecione um Jogador...</option>
                </select>
                <select id="perm-nivel" style="width: 100%; padding: 10px; background: var(--bg-principal); border: 1px solid var(--borda); color: white; border-radius: 4px; margin-bottom: 20px;">
                    <option value="leitura">👁️ Somente Leitura</option>
                    <option value="comentar">💬 Ler e Comentar</option>
                    <option value="editor">✍️ Editor (Postar e Editar)</option>
                </select>
                <button onclick="salvarPermissaoAba()" style="background: var(--destaque); color: #121214; border: none; padding: 0 15px; border-radius: 4px; font-weight: bold; cursor: pointer;">Conceder</button>
            </div>
            <h4 style="margin-bottom: 10px; color: var(--texto-mutado); overflow-y: auto; border-bottom: 1px solid var(--borda); padding-bottom: 5px;">Jogadores com Acesso</h4>
            <div id="lista-permissoes-atuais" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;"></div>
            <div style="display: flex; justify-content: flex-end;">
                <button onclick="fecharModalPermissoes()" style="padding: 10px 15px; background: transparent; border: 1px solid var(--texto-mutado); color: var(--texto-claro); border-radius: 4px; cursor: pointer;">Fechar</button>
            </div>
        </div>
    </div>

    <div id="modal-imagem" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 9999; flex-direction: column;" onclick="fecharModalImagem()">
        <div style="position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; z-index: 10001;" onclick="fecharModalImagem()">&times;</div>
        
        <div id="modal-btn-esq" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: white; font-size: 50px; cursor: pointer; user-select: none; padding: 20px; z-index: 10000; transition: 0.2s;" onmouseover="this.style.color='var(--destaque)'" onmouseout="this.style.color='white'" onclick="event.stopPropagation(); mudarImagem(-1)">&#10094;</div>
        
        <img id="imagem-ampliada" src="" style="max-width: 90%; max-height: 85%; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.8); object-fit: contain; transition: opacity 0.2s;">
        
        <div id="modal-btn-dir" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: white; font-size: 50px; cursor: pointer; user-select: none; padding: 20px; z-index: 10000; transition: 0.2s;" onmouseover="this.style.color='var(--destaque)'" onmouseout="this.style.color='white'" onclick="event.stopPropagation(); mudarImagem(1)">&#10095;</div>
        
        <div id="modal-contador" style="color: var(--texto-mutado); margin-top: 15px; font-size: 16px; font-weight: bold; letter-spacing: 1px;"></div>
    </div>
    
    <div id="modal-editar-post" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: var(--bg-card); padding: 30px; border-radius: 8px; border: 1px solid var(--roxo-mago); width: 600px; max-width: 90%;">
        <h3 style="margin-top: 0; color: var(--destaque);">✏️ Editar Postagem</h3>
        <input type="hidden" id="edit-post-id">
        <input type="hidden" id="edit-post-index">
        <textarea id="edit-post-texto" style="width: 100%; height: 250px; background: var(--bg-principal); border: 1px solid var(--borda); color: white; padding: 10px; border-radius: 4px; box-sizing: border-box; resize: vertical; margin-bottom: 20px;"></textarea>
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button onclick="document.getElementById('modal-editar-post').style.display='none'" style="padding: 10px 15px; background: transparent; border: 1px solid var(--texto-mutado); color: var(--texto-claro); border-radius: 4px; cursor: pointer;">Cancelar</button>
            <button onclick="confirmarEdicaoPost()" style="padding: 10px 15px; background: var(--roxo-mago); border: none; color: white; border-radius: 4px; font-weight: bold; cursor: pointer;">Salvar Alterações</button>
        </div>
    </div>
    </div>

   <script>
    // Configuração base (mantida igual)
    const token = localStorage.getItem('m20_token');
    if (!token) window.location.href = '/login.html';

    const urlParams = new URLSearchParams(window.location.search);
    const cronicaId = urlParams.get('id');

    let minhaPermissaoAtual = 'leitura';
    let meuPapelNaMesa = 'jogador';
    let meuIdUsuario = null;

    let lightboxImagens = [];
    let lightboxIndex = 0;

    if (!cronicaId) window.location.href = '/profile.html';

    carregarComunidade();

    function gerarGridImagens(imagensUrls) {
        if (!imagensUrls || imagensUrls.length === 0) return '';
        let urls = [];
        if (typeof imagensUrls === 'string') {
            try { urls = imagensUrls.startsWith('[') ? JSON.parse(imagensUrls) : [imagensUrls]; } catch(e) { urls = [imagensUrls]; }
        } else if (Array.isArray(imagensUrls)) { urls = imagensUrls; }

    
        urls = urls.filter(u => u && u.length > 5);
        const count = urls.length;
        if (count === 0) return '';

        const urlsFormatadas = urls.map(u => (u.startsWith('/') ? u : '/' + u));
        let gridCols = count === 1 ? "1fr" : (count === 2 ? "1fr 1fr" : "2fr 1fr");
        let gridRows = count >= 3 ? "1fr 1fr" : "1fr";
        let alturaGrid = count === 1 ? 'auto' : '350px';
        let maxAltura = count === 1 ? '500px' : 'none';
        const urlsStr = encodeURIComponent(JSON.stringify(urlsFormatadas));

        let html = `<div style="display: grid; gap: 5px; margin-top: 15px; border-radius: 8px; overflow: hidden; border: 1px solid var(--borda); grid-template-columns: ${gridCols}; grid-template-rows: ${gridRows}; height: ${alturaGrid}; max-height: ${maxAltura};">`;

        urlsFormatadas.forEach((url, i) => {
            if (i >= 3) return;
            let objFit = count === 1 ? 'contain' : 'cover';
            let bgStyle = count === 1 ? 'background: rgba(0,0,0,0.3);' : '';

            if (i === 2 && count > 3) {
                let ocultas = count - 3;
                html += `<div style="position: relative; width: 100%; height: 100%; cursor: pointer; ${bgStyle}" onclick="event.stopPropagation(); abrirModalNavegacao('${urlsStr}', ${i})">
                            <img src="${url}" style="width: 100%; height: 100%; object-fit: ${objFit}; object-position: center; display: block;">
                            <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; color: white; transition: 0.2s;" onmouseover="this.style.background='rgba(0,0,0,0.5)'" onmouseout="this.style.background='rgba(0,0,0,0.7)'">
                                +${ocultas}
                            </div>
                         </div>`;
            } else {
                html += `<div style="width: 100%; height: 100%; cursor: pointer; ${i === 0 && count >= 3 ? 'grid-row: span 2;' : ''} ${bgStyle}" onclick="event.stopPropagation(); abrirModalNavegacao('${urlsStr}', ${i})">
                            <img src="${url}" style="width: 100%; height: 100%; object-fit: ${objFit}; object-position: center; display: block; transition: 0.2s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
                         </div>`;
            }
        });
        html += `</div>`;
        return html;
    }

    function abrirModalNavegacao(urlsStrJSON, startIndex) {
        lightboxImagens = JSON.parse(decodeURIComponent(urlsStrJSON));
        lightboxIndex = startIndex;
        atualizarImagemModal();
        document.getElementById('modal-imagem').style.display = 'flex';
    }

    function atualizarImagemModal() {
        const imgEl = document.getElementById('imagem-ampliada');
        const contadorEl = document.getElementById('modal-contador');
        if (!imgEl) return;
        imgEl.style.opacity = '0';
        setTimeout(() => {
            imgEl.src = lightboxImagens[lightboxIndex];
            imgEl.style.opacity = '1';
        }, 100);
        if (contadorEl) contadorEl.innerText = `${lightboxIndex + 1} / ${lightboxImagens.length}`;
        const displaySetas = lightboxImagens.length > 1 ? 'block' : 'none';
        if (document.getElementById('modal-btn-esq')) document.getElementById('modal-btn-esq').style.display = displaySetas;
        if (document.getElementById('modal-btn-dir')) document.getElementById('modal-btn-dir').style.display = displaySetas;
    }

    function mudarImagem(direcao) {
        if (lightboxImagens.length <= 1) return;
        lightboxIndex += direcao;
        if (lightboxIndex < 0) lightboxIndex = lightboxImagens.length - 1; 
        if (lightboxIndex >= lightboxImagens.length) lightboxIndex = 0;      
        atualizarImagemModal();
    }

    function fecharModalImagem() {
        document.getElementById('modal-imagem').style.display = 'none';
        lightboxImagens = [];
    }

    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('modal-imagem');
        if (modal && modal.style.display === 'flex') {
            if (e.key === 'ArrowLeft') mudarImagem(-1);
            else if (e.key === 'ArrowRight') mudarImagem(1);
            else if (e.key === 'Escape') fecharModalImagem();
        }
    });

async function carregarComunidade() {
    try {
        const res = await fetch(`/cronicas/${cronicaId}/comunidade`, { headers: { 'Authorization': `Bearer ${token}` } });
        const dados = await res.json();
        if (!res.ok) {
            alert(dados.erro || "Acesso negado.");
            window.location.href = '/profile.html';
            return;
        }

        const titulo = dados.nome || "Comunidade da Crônica";
        const elementoNome = document.getElementById('nome-cronica') || document.querySelector('.nome-cronica') || document.querySelector('h1');
        if (elementoNome) elementoNome.innerText = titulo;

        const elementoBanner = document.getElementById('banner-cronica') || document.querySelector('.banner-comunidade');
        const urlCapa = dados.cronica.banner_url || dados.cronica.capa_url || dados.cronica.imagem_url;
        
        if (elementoBanner && urlCapa) {
            // Garante que as barras do Windows virem barras de URL normais
            let urlTratada = urlCapa.replace(/\\/g, '/');
            // Garante que a URL comece com / para o navegador encontrar a pasta na raiz
            if (!urlTratada.startsWith('/')) {
                urlTratada = '/' + urlTratada;
            }
            elementoBanner.style.backgroundImage = `url('${urlTratada}')`;
        }

        const menuAbas = document.getElementById('menu-abas') || document.getElementById('lista-abas') || document.querySelector('.menu-abas');
        if (!menuAbas) return;
        
        menuAbas.innerHTML = '';
        const isNarrador = (dados.papel === 'narrador' || dados.is_narrador);

        if (dados.abas && dados.abas.length > 0) {
            dados.abas.forEach(aba => {
                const icone = aba.tipo === 'restrita' ? '🔒' : '👁️';
                const btnExcluir = isNarrador ? `<span onclick="event.stopPropagation(); deletarAba('${aba.id}')" style="color: #ff5555; font-weight: bold; font-size: 14px; cursor: pointer; float: right;" title="Apagar Aba">✖</span>` : '';
                menuAbas.innerHTML += `
                    <div class="aba-item" onclick="selecionarAba('${aba.id}', this)">
                        ${icone} ${aba.nome}
                        ${btnExcluir}
                    </div>
                `;
            });
            setTimeout(() => {
                const primeiraAba = menuAbas.querySelector('.aba-item');
                if (primeiraAba) primeiraAba.click();
            }, 100);
        } else {
            menuAbas.innerHTML = '<p style="color: var(--texto-mutado); padding: 15px; font-size:13px;">Nenhuma aba visível.</p>';
        }

        // Links de gerenciamento (só narrador vê)
        if (dados.is_narrador || dados.papel === 'narrador') {
        menuAbas.innerHTML += `
        <a href="/controle_mundo.html?id=${cronicaId}" class="aba-item" style="text-decoration: none; display: block;">🌍 Controle de Mundo</a>
        <a href="/escudo_narrador.html?id=${cronicaId}" class="aba-item" style="text-decoration: none; display: block;">🛡️ Escudo do Narrador</a>
        `;
    }

        if (isNarrador) {
            menuAbas.innerHTML += `
                <button onclick="criarNovaAba()" style="width: 90%; margin: 15px auto; display: block; padding: 10px; background: transparent; border: 1px dashed var(--roxo-mago); color: var(--roxo-mago); border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s;">
                    + Nova Aba
                </button>
            `;
        }
    } catch (err) { console.error("Erro ao renderizar comunidade:", err); }
}

async function deletarAba(abaId) {
    if(!confirm("Deseja apagar esta sala e todo o seu conteúdo?")) return;
    try {
        const res = await fetch(`/cronicas/${cronicaId}/abas/${abaId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if(res.ok) {
            abaAtualId = null; 
            carregarComunidade();
        } else {
            alert("Erro ao deletar aba.");
        }
    } catch (e) { alert("Erro de conexão."); }
}

    async function carregarPosts() {
        const divPosts = document.getElementById('lista-posts');
        if(!abaAtualId) return;

        try {
            const res = await fetch(`/cronicas/${cronicaId}/abas/${abaAtualId}/posts`, { headers: { 'Authorization': `Bearer ${token}` } });
            const dados = await res.json();
            
            postsAtuaisNaAba = dados.posts || [];
            minhaPermissaoAtual = dados.minha_permissao;
            meuPapelNaMesa = dados.papel_na_mesa;
            meuIdUsuario = dados.meu_usuario_id;

            const nomeAbaAtiva = document.querySelector('.aba-item.ativa')?.innerText || "Aba";
            const btnPermissoes = (meuPapelNaMesa === 'narrador') 
                ? `<button onclick="abrirModalPermissoes('${abaAtualId}')" style="background: transparent; border: 1px solid var(--roxo-mago); color: var(--roxo-mago); padding: 5px 15px; border-radius: 4px; cursor: pointer;">🔐 Permissões</button>`
                : ``;

            divPosts.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--borda); padding-bottom: 10px;">
                    <h3>📑 ${nomeAbaAtiva}</h3>
                    ${btnPermissoes}
                </div>
              
                <div style="display: flex; gap: 20px; height: auto;">
                    <div id="leitura-principal" style="flex: 2.5; background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--borda);"></div>
                    <div id="lista-lateral" style="flex: 1; overflow-y: auto; border-left: 1px dashed var(--borda); padding-left: 15px;"></div>
                </div>
            `;

            const areaPostagem = document.querySelector('.caixa-postar');
            if (areaPostagem) {
                if (meuPapelNaMesa === 'narrador' || minhaPermissaoAtual === 'editor') {
                    areaPostagem.style.display = 'block';
                } else {
                    areaPostagem.style.display = 'none';
                }
            }

            const listaLateral = document.getElementById('lista-lateral');
            listaLateral.innerHTML = '';
            
            postsAtuaisNaAba.forEach((post, index) => {
                let imgs = [];
                try { imgs = typeof post.imagens === 'string' ? JSON.parse(post.imagens) : (post.imagens || []); } catch(e) {}
                const capa = (imgs.length > 0) ? imgs[0] : null;
                
                listaLateral.innerHTML += `
                    <div onclick="exibirPostCompleto(${index})" style="padding: 10px; cursor: pointer; border-bottom: 1px solid var(--borda);">
                        ${capa ? `<img src="${capa}" style="width: 100%; height: 60px; object-fit: cover; border-radius:4px;">` : '📄'}
                        <div style="font-size: 12px; margin-top: 5px;">${post.conteudo.substring(0,20)}...</div>
                    </div>
                `;
            });
            
            if(postsAtuaisNaAba.length > 0) exibirPostCompleto(0);
        } catch (err) { console.error(err); }
    }

    function selecionarAba(abaId, elemento) {
        abaAtualId = abaId;
        const todasAbas = document.querySelectorAll('.aba-item');
        todasAbas.forEach(aba => aba.classList.remove('ativa'));
        if (elemento) elemento.classList.add('ativa');
        carregarPosts();

                            <div style="position: absolute; left: 0; top: 0; bottom: 0; width: ${porcentagem}%; background: rgba(152, 113, 245, 0.15); transition: width 0.5s ease; z-index: 0;"></div>

        leituraPrincipal.innerHTML = `

                <div style="display: flex; align-items: center; gap: 15px;">
                    ${post.autor_avatar

<div style="width: 45px; height: 45px; border-radius: 50%; background: var(--roxo-mago); display: ${post.autor_avatar ? 'none' : 'flex'}; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: white; border: 2px solid var(--destaque); flex-shrink: 0;">${inicial}</div>

    async function deletarPost(postId) {
        if(!confirm("Atenção: Esta ação apagará permanentemente o registro e todos os seus comentários. Deseja prosseguir?")) return;
        try {
            const res = await fetch(`/cronicas/${cronicaId}/abas/${abaAtualId}/posts/${postId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) carregarPosts(); 
            else alert("Você não tem permissão para apagar este post.");
        } catch (err) { alert("Falha na matriz."); }
    }

    function editarPost(postId, index) {
        const post = postsAtuaisNaAba[index];
        if (!post) return;
        
        document.getElementById('edit-post-id').value = postId;
        document.getElementById('edit-post-index').value = index;
        
        if (post.tipo === 'normal' || !post.tipo) {
            const divTexto = document.getElementById('post-corpo-texto');
            document.getElementById('edit-post-texto').value = divTexto ? divTexto.innerText.trim() : post.conteudo || '';
            document.getElementById('modal-editar-post').style.display = 'flex';
            return;
        }
        
        if (post.tipo === 'album' && post.album_itens) {
            let html = '';
            post.album_itens.forEach((item, i) => {
                html += `
                    <div style="margin-bottom: 15px; padding: 10px; background: var(--bg-principal); border-radius: 4px;">
                        <img src="${item.imagem_url}" style="width: 100%; max-height: 150px; object-fit: contain; border-radius: 4px; margin-bottom: 8px;">
                        <label style="color: var(--texto-mutado); font-size: 12px;">Descrição da imagem ${i + 1}:</label>
                        <textarea class="edit-album-desc" data-item-id="${item.id}" style="width: 100%; min-height: 60px; padding: 8px; background: var(--bg-card); border: 1px solid var(--borda); color: #fff; border-radius: 4px; margin-top: 5px; box-sizing: border-box; resize: vertical;">${item.descricao || ''}</textarea>
                    </div>
                `;
            });
            
            document.getElementById('edit-post-texto').style.display = 'none';
            let albumDiv = document.getElementById('edit-album-container');
            if (!albumDiv) {
                albumDiv = document.createElement('div');
                albumDiv.id = 'edit-album-container';
                document.getElementById('edit-post-texto').parentNode.insertBefore(albumDiv, document.getElementById('edit-post-texto'));
            }
            albumDiv.innerHTML = html;
            albumDiv.style.display = 'block';
            document.getElementById('modal-editar-post').style.display = 'flex';
            return;
        }
        
        alert('Posts do tipo "votação" não podem ser editados, apenas apagados.');
    }

    async function confirmarEdicaoPost() {
        const postId = document.getElementById('edit-post-id').value;
        const index = document.getElementById('edit-post-index').value;
        const novoConteudo = document.getElementById('edit-post-texto').value.trim();

        try {
            const res = await fetch(`/cronicas/${cronicaId}/abas/${abaAtualId}/posts/${postId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ conteudo: novoConteudo })
            });
            if (res.ok) {
                document.getElementById('modal-editar-post').style.display = 'none';
                postsAtuaisNaAba[index].conteudo = novoConteudo;
                exibirPostCompleto(index);
            } else {
                alert("Erro ao atualizar o post.");
            }
        } catch (err) { alert("Erro de conexão."); }
    }

    async function carregarComentarios(postId) {
        const divComentarios = document.getElementById(`lista-comentarios-${postId}`);
        divComentarios.innerHTML = '<span style="color: var(--texto-mutado); font-size: 13px;">Carregando ecos...</span>';
        try {
            const res = await fetch(`/cronicas/${cronicaId}/posts/${postId}/comentarios`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const comentarios = await res.json();

            if (comentarios.length === 0) {
                divComentarios.innerHTML = '<div style="font-size: 13px; color: var(--texto-mutado);">Ninguém ecoou nesta memória ainda.</div>';
                return;
            }

            divComentarios.innerHTML = '';
            comentarios.forEach(c => {
                const dataC = new Date(c.criado_em).toLocaleString('pt-BR', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
                const nomeAutor = c.autor_nome || 'Desconhecido';
                const inicial = nomeAutor.charAt(0).toUpperCase();

                // Lógica de Renderização do Avatar no Comentário:
                const avatarHtml = c.autor_avatar 
                    ? `<img src="${c.autor_avatar}" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid var(--destaque); flex-shrink: 0;">`
                    : `<div style="width: 24px; height: 24px; border-radius: 50%; background: var(--roxo-mago); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: white; flex-shrink: 0;">${inicial}</div>`;

                divComentarios.innerHTML += `
            <div style="background: rgba(255,255,255,0.02); padding: 12px; border-radius: 6px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;">

                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px; width: 100%;">
                    ${avatarHtml}
                    <strong style="color: var(--destaque); font-size: 13px;">${nomeAutor}</strong>
                    <span style="font-size: 10px; color: var(--texto-mutado);">${dataC}</span>
                </div>

                <div id="comentario-texto-${c.id}" 
                style="font-size: 14px; color: var(--texto-claro); white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; text-align: left; box-sizing: border-box; width: 100%; margin-bottom: 12px; padding-left: 0;"> 
                ${c.conteudo}
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 8px; width: 100%;">
                    <button onclick="editarComentario('${postId}', '${c.id}')" style="background: #202024; border: 1px solid #8d8d99; color: #e1e1e6; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 12px;">Editar</button>
                    <button onclick="deletarComentario('${postId}', '${c.id}')" style="background: #202024; border: 1px solid #ff5555; color: #ff5555; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;">✕</button>
                </div>
            </div>
    `;
            });
        } catch (err) {
            divComentarios.innerHTML = '<div style="color: red; font-size: 13px;">Erro ao ler as tramas.</div>';
        }
    }

    async function enviarComentario(postId) {
        const input = document.getElementById(`input-comentario-${postId}`);
        const conteudo = input.value.trim();
        if (!conteudo) return;

        try {
            const res = await fetch(`/cronicas/${cronicaId}/posts/${postId}/comentarios`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ conteudo })
            });
            if (res.ok) {
                input.value = ''; 
                carregarComentarios(postId); 
            }
        } catch (err) { alert("Erro de conexão."); }
    }

    async function editarComentario(postId, comentarioId) {
        const paragrafo = document.getElementById(`comentario-texto-${comentarioId}`);
        const conteudoAntigo = paragrafo.innerText;
        const novoConteudo = prompt("Edite as suas palavras:", conteudoAntigo);
        if (!novoConteudo || novoConteudo.trim() === '' || novoConteudo === conteudoAntigo) return;
        try {
            const res = await fetch(`/cronicas/${cronicaId}/posts/${postId}/comentarios/${comentarioId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ conteudo: novoConteudo })
            });
            if (res.ok) carregarComentarios(postId);
            else alert("Você só pode editar os seus próprios comentários.");
        } catch (err) { alert("Erro de conexão."); }
    }

    async function deletarComentario(postId, comentarioId) {
        if (!confirm("Tem certeza que deseja apagar este comentário permanentemente?")) return;
        try {
            const res = await fetch(`/cronicas/${cronicaId}/posts/${postId}/comentarios/${comentarioId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) carregarComentarios(postId);
            else alert("Apenas o autor ou o Narrador podem apagar este comentário.");
        } catch (err) { alert("Erro de conexão."); }
    }

    async function publicarPost() {
        if (!abaAtualId) return alert('Selecione uma aba primeiro.');
        let payload = { tipo: tipoPostSelecionado };
        
        try {
            if (tipoPostSelecionado === 'normal') {
                const conteudo = document.getElementById('texto-post').value.trim();
                const inputImg = document.getElementById('input-imagem');
                if (!conteudo && inputImg.files.length === 0) return alert('Escreva algo ou anexe uma imagem.');
                payload.conteudo = conteudo;
                
                if (inputImg.files.length > 0) {
                    const formData = new FormData();
                    formData.append('imagens', inputImg.files[0]);
                    const resUpload = await fetch('/midia/upload/social', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
                    const dataUpload = await resUpload.json();
                    if (!resUpload.ok) throw new Error(dataUpload.erro);
                    payload.imagem_url = dataUpload.urls?.[0] || dataUpload.url;
                }
            }
            else if (tipoPostSelecionado === 'album') {
                const itens = document.querySelectorAll('#album-itens > div');
                if (itens.length === 0) return alert('Adicione pelo menos uma imagem ao álbum.');
                payload.album_itens = [];
                for (let item of itens) {
                    const id = item.id.split('-')[2];
                    const descricao = document.getElementById(`album-desc-${id}`)?.value || '';
                    const imgInput = document.getElementById(`album-img-${id}`);
                    if (!imgInput.files.length) continue;
                    
                    const formData = new FormData();
                    formData.append('imagens', imgInput.files[0]);
                    const resUpload = await fetch('/midia/upload/social', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
                    const dataUpload = await resUpload.json();
                    if (!resUpload.ok) throw new Error(dataUpload.erro);
                    payload.album_itens.push({ imagem_url: dataUpload.urls?.[0] || dataUpload.url, descricao: descricao });
                }
                if (payload.album_itens.length === 0) return alert('Selecione pelo menos uma imagem para cada item do álbum.');
            }
            else if (tipoPostSelecionado === 'votacao') {
                const pergunta = document.getElementById('votacao-pergunta').value.trim();
                if (!pergunta) return alert('Digite a pergunta da votação.');
                const opcoes = [...document.querySelectorAll('.opcao-votacao')].map(i => i.value.trim()).filter(v => v);
                if (opcoes.length < 2) return alert('Adicione pelo menos 2 opções.');
                payload.pergunta = pergunta;
                payload.opcoes = opcoes;
            }
            
            const res = await fetch(`/cronicas/${cronicaId}/abas/${abaAtualId}/posts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            if (!res.ok) { const err = await res.json(); throw new Error(err.erro || 'Erro ao publicar.'); }
            
            document.getElementById('texto-post').value = '';
            document.getElementById('input-imagem').value = '';
            document.getElementById('album-itens').innerHTML = '';
            document.getElementById('votacao-pergunta').value = '';
            document.getElementById('votacao-opcoes').innerHTML = `<input type="text" class="opcao-votacao" placeholder="Opção 1" style="width: 100%; padding: 8px; margin-bottom: 5px; background: var(--bg-principal); border: 1px solid var(--borda); color: #fff; border-radius: 4px;"><input type="text" class="opcao-votacao" placeholder="Opção 2" style="width: 100%; padding: 8px; margin-bottom: 5px; background: var(--bg-principal); border: 1px solid var(--borda); color: #fff; border-radius: 4px;">`;
            albumItensCount = 0;
            carregarPosts();
        } catch (err) { alert(err.message); }
    }

    
    

    async function criarNovaAba() {
        const nomeAba = prompt("Qual será o nome da nova sala? (Ex: NPCs, Diários, Segredos)");
        if (!nomeAba || nomeAba.trim() === '') return;

        try {
            const resposta = await fetch(`/cronicas/${cronicaId}/abas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ nome: nomeAba, tipo: 'restrita' })
            });
            if (resposta.ok) carregarComunidade();
            else alert("Erro ao criar aba.");
        } catch (err) { alert("A conexão falhou."); }
    }

        
    async function abrirModalPermissoes(abaId) {
        document.getElementById('perm-aba-id').value = abaId;
        document.getElementById('modal-permissoes').style.display = 'flex';
        const selectJogadores = document.getElementById('perm-jogador-id');
        const listaPermissoes = document.getElementById('lista-permissoes-atuais');

        try {
            const res = await fetch(`/cronicas/${cronicaId}/abas/${abaId}/permissoes`, { headers: { 'Authorization': `Bearer ${token}` } });
            const dados = await res.json();
            
            selectJogadores.innerHTML = '<option value="">Selecione um Jogador...</option>';
            dados.jogadores.forEach(j => selectJogadores.innerHTML += `<option value="${j.id}">${j.nome_usuario}</option>`);

            listaPermissoes.innerHTML = '';
            dados.permissoes.forEach(p => {
                listaPermissoes.innerHTML += `
                    <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 8px 10px; margin-bottom: 5px; border-radius: 4px;">
                        <div><strong>${p.nome_usuario}</strong> <span style="font-size: 12px; color: var(--texto-mutado); margin-left: 10px;">${p.nivel_acesso.toUpperCase()}</span></div>
                        <button onclick="revogarPermissao('${abaId}', '${p.jogador_id}')" style="background: transparent; color: #ff5555; border: 1px solid #ff5555; border-radius: 4px; cursor: pointer; padding: 2px 8px; font-size: 12px;">Revogar</button>
                    </div>
                `;
            });
        } catch (err) { listaPermissoes.innerHTML = '<div style="color: red;">Erro.</div>'; }
    }

    function fecharModalPermissoes() { document.getElementById('modal-permissoes').style.display = 'none'; }

    async function salvarPermissaoAba() {
        const abaId = document.getElementById('perm-aba-id').value;
        const jogadorId = document.getElementById('perm-jogador-id').value;
        const nivel = document.getElementById('perm-nivel').value;

        if (!jogadorId || jogadorId.trim() === "") {
            alert("Por favor, selecione um Desperto na lista antes de conceder acesso.");
            return; 
        }

        try {
            const res = await fetch(`/cronicas/${cronicaId}/abas/${abaId}/permissoes`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ jogador_id: jogadorId, nivel_acesso: nivel })
            });
            
            if (res.ok) {
                abrirModalPermissoes(abaId); 
            } else {
                const dadosErro = await res.json();
                alert(dadosErro.erro || "Erro ao conceder acesso.");
            }
        } catch (err) { 
            alert("Erro de conexão.");
        }
    }

    async function revogarPermissao(abaId, jogadorId) {
        try {
            const res = await fetch(`/cronicas/${cronicaId}/abas/${abaId}/permissoes/${jogadorId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) abrirModalPermissoes(abaId); 
        } catch (err) { alert("Erro de conexão."); }
    }
    
    function limparUpload() {
        const input = document.getElementById('input-imagem');
        input.value = ''; 
        const previewContainer = document.getElementById('container-previews');
        if (previewContainer) previewContainer.innerHTML = '';
        if (typeof listaImagensParaUpload !== 'undefined') listaImagensParaUpload = [];
    }

    async function votar(postId, opcaoId) {
        try {
            const res = await fetch(`/cronicas/${cronicaId}/posts/${postId}/votar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ opcao_id: opcaoId })
            });

            const dados = await res.json();

            if (res.ok) {
                const post = postsAtuaisNaAba.find(p => p.id === postId);
                if (post && dados.opcoes) {
                    post.opcoes = dados.opcoes;
                    const index = postsAtuaisNaAba.findIndex(p => p.id === postId);
                    if (index >= 0) exibirPostCompleto(index);
                }
            } else {
                alert(dados.erro || 'Erro ao votar.');
            }
        } catch (err) {
            alert('Erro de conexão.');
        }
    }

    window.selecionarAba = selecionarAba;
    window.deletarAba = (typeof deletarAba !== 'undefined') ? deletarAba : 
                       ((typeof apagarAba !== 'undefined') ? apagarAba : 
                       function(id) { alert("A função original de apagar aba não foi encontrada."); });

   </script>
