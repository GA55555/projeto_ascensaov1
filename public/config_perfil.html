<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações do Perfil</title>
    <link rel="stylesheet" href="/css/global_ui.css">
</head>
<body style="max-width: 800px; margin: 40px auto; padding: 20px;">

    <a href="/profile.html" class="texto-mutado"><i data-lucide="arrow-left"></i> Voltar ao Perfil</a>
    <h2 class="texto-roxo" style="margin: 20px 0 16px;"><i data-lucide="settings"></i> Configurações do Desperto</h2>

    <div class="card">
        <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 20px;">
            <img id="avatar-preview" class="avatar-preview" src="/uploads/avatares/default.png">
            <div>
                <input type="file" id="input-avatar" accept="image/*" onchange="uploadAvatar()">
                <p class="texto-mutado" style="font-size: 11px; margin-top: 4px;">JPG, PNG ou WebP. Máx 2MB</p>
            </div>
        </div>

        <div class="campo">
            <label>Nome de Perfil</label>
            <input type="text" id="nome-usuario">
        </div>
        <div class="campo">
            <label>Email</label>
            <input type="email" id="email-usuario">
        </div>
        <button class="btn btn-primary" onclick="salvarDados()"><i data-lucide="save"></i> Salvar Dados</button>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3 class="texto-roxo"><i data-lucide="lock"></i> Alterar Senha</h3>
        <div class="campo">
            <label>Senha Atual</label>
            <input type="password" id="senha-atual">
        </div>
        <div class="campo">
            <label>Nova Senha</label>
            <input type="password" id="nova-senha">
        </div>
        <div class="campo">
            <label>Confirmar Nova Senha</label>
            <input type="password" id="confirmar-senha">
        </div>
        <button class="btn btn-primary" onclick="alterarSenha()"><i data-lucide="shield-check"></i> Alterar Senha</button>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3 class="texto-roxo"><i data-lucide="palette"></i> Tema da Interface</h3>
        <div class="campo">
            <label>Estilo Visual</label>
            <select id="seletor-tema">
                <option value="padrao">Clássico (Glassmorphism)</option>
                <option value="tema-pixel-16bit">16-Bit JRPG Clássico</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="salvarTema()"><i data-lucide="save"></i> Salvar Tema</button>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3 class="texto-roxo"><i data-lucide="users"></i> Identidades em Crônicas</h3>
        <div id="container-perfis-cronica">
            <p class="texto-mutado">Carregando...</p>
        </div>
    </div>

    <div id="msg" class="msg"></div>

    <script src="/js/lucide.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        if (!localStorage.getItem('m20_user')) window.location.href = '/login.html';

        let nomeOficial = '';

        function mostrarMsg(texto, tipo) {
            const msg = document.getElementById('msg');
            msg.innerText = texto;
            msg.className = `msg msg-${tipo}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        async function carregarPerfil() {
            try {
                const res = await fetch('/perfil', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const dados = await res.json();

                nomeOficial = dados.usuario.nome_usuario;
                document.getElementById('nome-usuario').value = nomeOficial;
                document.getElementById('email-usuario').value = dados.usuario.email;

                if (dados.usuario.avatar_url) {
                    document.getElementById('avatar-preview').src = dados.usuario.avatar_url;
                }

                const seletorTema = document.getElementById('seletor-tema');
                if (seletorTema && dados.usuario.tema_interface) {
                    seletorTema.value = dados.usuario.tema_interface;
                }

                renderizarPerfisCronica(dados.perfis_cronica);

            } catch (err) {
                console.error(err);
                mostrarMsg('Erro ao carregar o perfil.', 'erro');
            }
        }

        function renderizarPerfisCronica(cronicas) {
            const container = document.getElementById('container-perfis-cronica');
            container.innerHTML = '';

            if (!cronicas || cronicas.length === 0) {
                container.innerHTML = '<p class="texto-mutado">Nenhuma crônica encontrada.</p>';
                return;
            }

            cronicas.forEach(cronica => {
                const apelidoDisplay = cronica.apelido || 'Ainda sem apelido nesta crônica';
                const avatarDisplay = cronica.avatar_url || '/uploads/avatares/default.png';

                const div = document.createElement('div');
                div.className = 'item-interativo';
                div.style.marginBottom = '16px';

                div.innerHTML = `
                    <h4 style="margin-top: 0; margin-bottom: 15px;">${escapeHTML(cronica.cronica_nome)}</h4>

                    <div class="preview-identidade">
                        <img src="${escapeHTML(avatarDisplay)}" alt="Avatar do Jogador" class="avatar-cronica">
                        <div style="line-height: 1.3;">
                            <div style="font-weight: 700; font-size: 1.1rem; color: var(--roxo-mago);">${escapeHTML(apelidoDisplay)}</div>
                            <div class="texto-mutado" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">${escapeHTML(nomeOficial)}</div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; flex-direction: column;">
                        <div class="campo" style="margin-bottom: 0;">
                            <label>Apelido da personagem / jogador</label>
                            <input type="text" id="apelido-${escapeHTML(String(cronica.cronica_id))}" value="${escapeHTML(cronica.apelido || '')}" placeholder="Como você é conhecido aqui">
                        </div>
                        <div class="campo" style="margin-bottom: 10px;">
                            <label>Mudar Avatar Específico (Opcional)</label>
                            <input type="file" id="avatar-cronica-${escapeHTML(String(cronica.cronica_id))}" accept="image/*" onchange="uploadAvatarCronica('${escapeHTML(String(cronica.cronica_id))}')" style="font-size: 13px;">
                        </div>
                        <button class="btn btn-primary" style="align-self: flex-start;" onclick="salvarPerfilCronica('${escapeHTML(String(cronica.cronica_id))}')">
                            <i data-lucide="save"></i> Salvar Identidade
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        async function salvarTema() {
            const tema_interface = document.getElementById('seletor-tema').value;
            try {
                const res = await fetch('/perfil/tema', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ tema_interface })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('m20_tema', tema_interface);
                    // Aplica o tema imediatamente sem recarregar a página
                    document.documentElement.classList.remove('tema-pixel-16bit');
                    if (tema_interface !== 'padrao') {
                        document.documentElement.classList.add(tema_interface);
                    }
                    mostrarMsg(data.mensagem, 'sucesso');
                } else {
                    mostrarMsg(data.erro, 'erro');
                }
            } catch (err) {
                mostrarMsg('Erro de conexão.', 'erro');
            }
        }

        async function salvarDados() {
            const nome_usuario = document.getElementById('nome-usuario').value;
            const email = document.getElementById('email-usuario').value;

            try {
                const res = await fetch('/perfil/dados', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ nome_usuario, email })
                });
                const data = await res.json();
                if (res.ok) {
                    mostrarMsg(data.mensagem, 'sucesso');
                    carregarPerfil();
                } else {
                    mostrarMsg(data.erro, 'erro');
                }
            } catch (err) {
                mostrarMsg('Erro de conexão.', 'erro');
            }
        }

        async function uploadAvatar() {
            const input = document.getElementById('input-avatar');
            if (!input.files || !input.files.length) return;

            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) { document.getElementById('avatar-preview').src = e.target.result; };
            reader.readAsDataURL(file);

            const formData = new FormData();
            formData.append('imagens', file);

            try {
                const res = await fetch('/midia/upload/avatares', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await res.json();

                if (res.ok && data.urls && data.urls.length) {
                    await fetch('/perfil/avatar', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ avatar_url: data.urls[0] })
                    });
                    mostrarMsg('Avatar atualizado!', 'sucesso');
                } else {
                    mostrarMsg(data.erro || 'Erro no upload.', 'erro');
                }
            } catch (err) {
                mostrarMsg('Erro de conexão.', 'erro');
            }
        }

        async function alterarSenha() {
            const senha_atual = document.getElementById('senha-atual').value;
            const nova_senha = document.getElementById('nova-senha').value;
            const confirmar = document.getElementById('confirmar-senha').value;

            if (nova_senha !== confirmar) return mostrarMsg('Senhas não conferem.', 'erro');

            try {
                const res = await fetch('/perfil/senha', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ senha_atual, nova_senha })
                });
                const data = await res.json();
                if (res.ok) mostrarMsg(data.mensagem, 'sucesso');
                else mostrarMsg(data.erro, 'erro');
            } catch (err) {
                mostrarMsg('Erro de conexão.', 'erro');
            }
        }

        async function salvarPerfilCronica(cronicaId) {
            const apelido = document.getElementById(`apelido-${cronicaId}`).value;

            try {
                const res = await fetch(`/perfil/cronica/${cronicaId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ apelido })
                });
                const data = await res.json();

                if (res.ok) {
                    mostrarMsg(data.mensagem || 'Identidade salva!', 'sucesso');
                    carregarPerfil();
                } else {
                    mostrarMsg(data.erro, 'erro');
                }
            } catch (err) {
                mostrarMsg('Erro de conexão.', 'erro');
            }
        }

        async function uploadAvatarCronica(cronicaId) {
            const input = document.getElementById(`avatar-cronica-${cronicaId}`);
            if (!input.files || !input.files.length) return;

            const formData = new FormData();
            formData.append('imagens', input.files[0]);

            try {
                const res = await fetch('/midia/upload/avatares', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await res.json();

                if (res.ok && data.urls && data.urls.length) {
                    const apelido = document.getElementById(`apelido-${cronicaId}`).value;
                    const resUpdate = await fetch(`/perfil/cronica/${cronicaId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ apelido: apelido, avatar_url: data.urls[0] })
                    });

                    if (resUpdate.ok) {
                        mostrarMsg('Avatar da crônica atualizado!', 'sucesso');
                        carregarPerfil();
                    }
                } else {
                    mostrarMsg(data.erro || 'Erro no upload.', 'erro');
                }
            } catch (err) {
                mostrarMsg('Erro de conexão.', 'erro');
            }
        }

        lucide.createIcons();
        carregarPerfil();
    </script>
    <script src="/js/toast.js"></script>
    <script src="/js/modalConfirmacao.js"></script>
</body>
</html>
