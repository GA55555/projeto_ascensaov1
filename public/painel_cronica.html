<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochila do Aventureiro - Gerenciar Crônica</title>
    <style>
        :root { --bg-principal: #121214; --bg-card: #202024; --roxo-mago: #9871f5; --roxo-hover: #7f57df; --texto-claro: #e1e1e6; --borda: #29292e; --sucesso: #50fa7b; --erro: #f75a68; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-principal); color: var(--texto-claro); max-width: 800px; margin: 40px auto; padding: 20px; }
        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--borda); padding-bottom: 20px; }
        h1, h3 { color: var(--roxo-mago); margin: 0; }
        
        .caixa { background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--borda); margin-bottom: 20px; }
        
        .form-convite { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 10px; background: var(--bg-principal); border: 1px solid var(--borda); color: #fff; border-radius: 4px; outline: none; }
        button { background: var(--roxo-mago); color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--roxo-hover); }
        
        .lista-jogadores { list-style: none; padding: 0; margin: 0; }
        .jogador-item { background: var(--bg-principal); padding: 15px; border: 1px solid var(--borda); border-radius: 4px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: var(--roxo-mago); padding: 3px 8px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header-painel">
        <h1>Gerenciar Crônica</h1>
        <a href="/profile.html" style="color: var(--texto-claro); text-decoration: none;">Voltar ao Hub</a>
    </div>

    <div class="caixa">
        <h3>Convidar Desperto</h3>
        <p style="font-size: 14px; color: #8d8d99; margin-top: 5px;">Digite o e-mail cadastrado do jogador para adicioná-lo à mesa.</p>
        <div class="form-convite">
            <input type="email" id="email-novo-jogador" placeholder="email@do-jogador.com">
            <button onclick="adicionarJogador()">Adicionar</button>
        </div>
    </div>

    <div class="caixa">
        <h3>Jogadores na Mesa</h3>
        <ul class="lista-jogadores" id="lista-jogadores">
            <p style="color: #8d8d99;">Carregando membros da cabala...</p>
        </ul>
    </div>

<script>
    const token = localStorage.getItem('m20_token');
    const urlParams = new URLSearchParams(window.location.search);
    const cronicaId = urlParams.get('id');

    if (!token) window.location.href = '/login.html';
    if (!cronicaId) window.location.href = '/profile.html';

    async function verificarAcesso() {
        try {
            const res = await fetch(`/cronicas/${cronicaId}/comunidade`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) throw new Error();
            const dados = await res.json();
            if (!dados.is_narrador) {
                alert("Apenas o Narrador pode gerenciar os jogadores desta crônica.");
                window.location.href = '/profile.html';
                return false;
            }
            return true;
        } catch (err) {
            window.location.href = '/profile.html';
            return false;
        }
    }

    async function carregarJogadores() {
        try {
            const resposta = await fetch(`/cronicas/${cronicaId}/jogadores`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!resposta.ok) throw new Error("Erro ao buscar jogadores");
            
            const jogadores = await resposta.json();
            const lista = document.getElementById('lista-jogadores');
            lista.innerHTML = '';

            if (jogadores.length === 0) {
                lista.innerHTML = '<p style="color: #8d8d99;">Nenhum jogador nesta crônica ainda.</p>';
                return;
            }

            jogadores.forEach(jog => {
                lista.innerHTML += `
                    <li class="jogador-item">
                        <span><strong>${jog.nome_usuario}</strong></span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="badge">${jog.papel.toUpperCase()}</span>
                            <button onclick="removerJogador('${jog.id}', '${jog.nome_usuario}')" 
                                style="background: transparent; border: 1px solid #ff5555; color: #ff5555; 
                                       padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px;"
                                title="Remover jogador">
                                ✕
                            </button>
                        </div>
                    </li>
                `;
            });
        } catch (err) {
            console.error(err);
            document.getElementById('lista-jogadores').innerHTML = '<p style="color: var(--erro);">Falha ao carregar jogadores.</p>';
        }
    }

    async function adicionarJogador() {
        const email = document.getElementById('email-novo-jogador').value;
        if (!email) { alert("Digite um e-mail."); return; }

        try {
            const resposta = await fetch(`/cronicas/${cronicaId}/adicionar-jogador`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ email_jogador: email })
            });

            const dados = await resposta.json();
            if (!resposta.ok) throw new Error(dados.erro || 'Erro ao adicionar.');
            alert(dados.mensagem);
            document.getElementById('email-novo-jogador').value = '';
            carregarJogadores(); 
        } catch (err) {
            alert(err.message);
        }
    }

    async function removerJogador(jogadorId, nomeJogador) {
        if (!confirm(`Tem certeza que deseja remover ${nomeJogador} desta crônica?`)) return;

        try {
            const resposta = await fetch(`/cronicas/${cronicaId}/jogadores/${jogadorId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            const dados = await resposta.json();
            if (!resposta.ok) throw new Error(dados.erro || 'Erro ao remover.');
            alert(dados.mensagem);
            carregarJogadores();
        } catch (err) {
            alert(err.message);
        }
    }

    (async function iniciar() {
        const temAcesso = await verificarAcesso();
        if (temAcesso) carregarJogadores();
    })();
</script>
</body>
</html>
